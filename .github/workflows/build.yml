name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y gcc make
      
      - name: Build program
        run: make
      
      - name: Run tests
        run: |
          echo "=== Test 1 ==="
          ./processor "your mama dont likes me she likes every one"
          echo ""
          echo "=== Test 2 ==="
          ./processor "hello world test"
      
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: processor-binary
          path: processor

  package:
    name: Create DEB Package
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: processor-binary
          path: .
      
      - name: Make binary executable
        run: chmod +x processor
      
      - name: Build DEB package
        run: |
          mkdir -p processor_1.0/usr/local/bin
          mkdir -p processor_1.0/DEBIAN
          cp processor processor_1.0/usr/local/bin/
          
          cat > processor_1.0/DEBIAN/control << 'EOC'
          Package: processor
          Version: 1.0
          Section: utils
          Priority: optional
          Architecture: arm64
          Depends: libc6
          Maintainer: Student <student@example.com>
          Description: String processor
          EOC
          
          dpkg-deb --build processor_1.0
      
      - name: Upload DEB package
        uses: actions/upload-artifact@v4
        with:
          name: processor-deb
          path: processor_1.0.deb
