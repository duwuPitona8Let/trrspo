name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y gcc make
      
      - name: Build
        run: |
          chmod +x ci/build.sh
          ./ci/build.sh
      
      - name: Test
        run: |
          chmod +x ci/test.sh
          ./ci/test.sh
      
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: processor-binary
          path: processor

  package:
    name: Create DEB Package
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: processor-binary
          path: .
      
      - name: Make binary executable
        run: chmod +x processor
      
      - name: Create DEB
        run: |
          chmod +x ci/package.sh
          ./ci/package.sh
      
      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: processor-deb
          path: processor_1.0.deb

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download DEB
        uses: actions/download-artifact@v4
        with:
          name: processor-deb
          path: .
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: processor_1.0.deb
          name: Release ${{ github.ref_name }}
          body: |
            Автоматический релиз от GitHub Actions
            
            Программа: замена пробелов на самый частый символ
            Вариант: 21
          draft: false
          prerelease: false
          generate_release_notes: true
