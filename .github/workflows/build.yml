name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y gcc make
      
      - name: Run build script
        run: ./ci/build.sh
      
      - name: Run test script
        run: ./ci/test.sh
      
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: processor-binary
          path: processor

  package:
    name: Create DEB Package
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: processor-binary
          path: .
      
      - name: Make binary executable
        run: chmod +x processor
      
      - name: Run package script
        run: ./ci/package.sh
      
      - name: Upload DEB package
        uses: actions/upload-artifact@v4
        with:
          name: processor-deb
          path: processor_1.0.deb

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download DEB package
        uses: actions/download-artifact@v4
        with:
          name: processor-deb
          path: .
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: processor_1.0.deb
          name: Release ${{ github.ref_name }}
          body: |
            Автоматический релиз от GitHub Actions
            
            Программа: замена пробелов на самый частый символ
            Вариант: 21
